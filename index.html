<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>日月食教育演示</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:sans-serif;background:#000}
    #container{width:100%;height:100%}

    #timeline-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      background:rgba(8,8,16,0.92);backdrop-filter:blur(8px);
      padding:12px 24px;display:flex;align-items:center;gap:12px;
      border-top:1px solid rgba(255,255,255,0.1);
    }
    #timeline-bar button,#timeline-bar select{
      background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);
      padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;
      transition:all .15s;white-space:nowrap;
    }
    #timeline-bar button:hover,#timeline-bar select:hover{background:rgba(255,255,255,0.15);color:#fff}
    #playBtn{width:42px;text-align:center}
    #timeline{flex:1;height:6px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.1);
      border-radius:3px;outline:none;cursor:pointer;accent-color:#4a9eff}
    #dateDisplay{color:#8cf;font-size:14px;min-width:90px;text-align:center;font-variant-numeric:tabular-nums}
    #speedDisplay{color:#888;font-size:12px;min-width:55px;text-align:center}
    #brightness-group{display:flex;align-items:center;gap:6px;margin-left:12px}
    #brightness-group label{color:#aaa;font-size:12px;white-space:nowrap}
    #brightness-group input[type=range]{
      width:72px;height:4px;-webkit-appearance:none;appearance:none;
      background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer;accent-color:#f0c040}
    #brightness-group input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#f0c040;cursor:pointer}
    #brightness-group input[type=range]::-moz-range-thumb{
      width:12px;height:12px;border-radius:50%;background:#f0c040;border:none;cursor:pointer}

    #timeline-bar select option{background:#111118;color:#ccc}
    #info-overlay{
      position:fixed;top:12px;left:16px;z-index:99;pointer-events:none;
      color:rgba(255,255,255,0.5);font-size:12px;user-select:text;
    }
    #focus-btns{
      position:fixed;top:12px;right:16px;z-index:100;display:flex;flex-wrap:wrap;gap:6px;max-width:220px;
    }
    #focus-btns button{
      background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);
      padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;
      transition:all .15s;
    }
    #focus-btns button:hover{background:rgba(255,255,255,0.2);color:#fff}
    #plane-toggle{
      position:fixed;top:160px;right:16px;z-index:100;display:flex;flex-direction:column;gap:6px;
    }
    #plane-toggle label{
      display:flex;align-items:center;gap:6px;color:#aaa;font-size:12px;cursor:pointer;
      background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);
    }
    #plane-toggle label:hover{background:rgba(255,255,255,0.1);color:#fff}
    #season-btns{
      position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;
    }
    #season-btns button{
      background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);
      padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s;
    }
    #season-btns button:hover{background:rgba(255,255,255,0.2);color:#fff}
    #camera-mode{
      position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:4px;
    }
    #camera-mode button{
      background:rgba(255,255,255,0.06);color:#888;border:1px solid rgba(255,255,255,0.1);
      padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;transition:all .15s;
    }
    #camera-mode button:hover{background:rgba(255,255,255,0.12);color:#ccc}
    #camera-mode button.active{background:rgba(74,158,255,0.25);color:#4a9eff;border-color:rgba(74,158,255,0.4)}
    #select-hint{
      background:rgba(74,158,255,0.15);color:#4a9eff;padding:4px 14px;border-radius:6px;
      font-size:12px;pointer-events:none;display:none;border:1px solid rgba(74,158,255,0.3);
      white-space:nowrap;
    }
    #coord-display{
      position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:100;
      background:rgba(8,8,16,0.85);color:#8cf;padding:4px 14px;border-radius:6px;
      font-size:12px;pointer-events:auto;user-select:text;display:none;
    }
    #confirm-btn{
      position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:100;
      background:rgba(74,158,255,0.3);color:#4a9eff;padding:6px 18px;border-radius:6px;
      cursor:pointer;font-size:13px;border:1px solid rgba(74,158,255,0.4);display:none;
      transition:all .15s;
    }
    #confirm-btn:hover{background:rgba(74,158,255,0.5);color:#fff}
    #surface-select-bar{
      position:fixed;top:42px;left:50%;transform:translateX(-50%);z-index:100;
      display:none;align-items:center;gap:8px;flex-direction:row;
    }
    #preset-selector{
      display:flex;align-items:center;gap:4px;
    }
    #preset-selector select{
      background:rgba(8,8,16,0.85);color:#8cf;border:1px solid rgba(255,255,255,0.15);
      border-radius:4px;padding:3px 8px;font-size:11px;font-family:monospace;cursor:pointer;
    }
    #preset-selector select:hover{border-color:#4a9eff}
    #surface-compass{
      position:fixed;bottom:150px;left:50%;transform:translateX(-50%);z-index:101;
      width:80px;height:80px;border-radius:50%;
      background:rgba(8,8,16,0.7);border:1px solid rgba(255,255,255,0.15);
      pointer-events:none;display:none;
    }
    #surface-compass .n{
      position:absolute;top:4px;left:50%;transform:translateX(-50%);
      color:#ff4444;font-size:13px;font-weight:bold;
    }
    #surface-compass .s{
      position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
      color:#aaa;font-size:13px;
    }
    #surface-compass .e{
      position:absolute;right:6px;top:50%;transform:translateY(-50%);
      color:#ffaa44;font-size:13px;
    }
    #surface-compass .w{
      position:absolute;left:6px;top:50%;transform:translateY(-50%);
      color:#ffaa44;font-size:13px;
    }
    #surface-compass .arrow{
      position:absolute;top:50%;left:50%;width:0;height:0;
      margin-left:-5px;margin-top:-24px;
      border-left:5px solid transparent;border-right:5px solid transparent;
      border-bottom:10px solid #ff4444;
    }
    #debug-overlay{
      position:fixed;top:60px;left:16px;z-index:99;pointer-events:auto;user-select:text;
      background:rgba(8,8,16,0.85);border:1px solid rgba(255,255,255,0.1);
      border-radius:6px;padding:8px 12px;font-family:monospace;font-size:11px;
      color:#8cf;line-height:1.6;min-width:220px;display:none;
    }
    #debug-overlay .label{color:#666}
    #debug-overlay .ok{color:#4a4}
    #debug-overlay .warn{color:#fa0}
    #debug-overlay .err{color:#f44}
    #debug-overlay .tkbtn{background:rgba(255,255,255,0.08);color:#8cf;border:1px solid rgba(255,255,255,0.15);border-radius:3px;cursor:pointer}
    #debug-overlay .tkbtn:hover{background:rgba(255,255,255,0.2)}
    #debug-overlay .tkbtn.active{background:rgba(100,200,255,0.25);border-color:#8cf}
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="timeline-bar">
    <button id="playBtn">▶</button>
    <span id="dateDisplay"></span>
    <input type="date" id="jumpDate" title="跳转到指定日期" style="width:110px;font-size:11px;padding:2px 4px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(255,255,255,0.08);color:#ccc">
    <input type="number" id="yearInput" value="2025" min="-9999" max="9999" title="设置年份（春分基准年）" style="width:60px;font-size:11px;padding:2px 4px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(255,255,255,0.08);color:#ccc">
    <input type="range" id="timeline" min="0" max="365" step="0.01" value="0" title="拖拽调整时间">
    <select id="speedSelect" title="播放速度">
      <option value="0.0000116">1秒/秒</option>
      <option value="0.000694">1分/秒</option>
      <option value="0.0417" selected>1小时/秒</option>
      <option value="1">1天/秒</option>
      <option value="3">3天/秒</option>
      <option value="10">10天/秒</option>
      <option value="30">30天/秒</option>
      <option value="__custom__">自定义</option>
    </select>
    <input type="number" id="customSpeed" value="60" min="0.001" step="1" title="自定义速度（分钟/秒），滚轮调整" style="width:60px;font-size:12px;display:none">
    <span id="speedDisplay">1时/秒</span>
    <div id="brightness-group">
      <label>☀ 亮度</label>
      <input type="range" id="brightnessSlider" min="0.3" max="6" step="0.1" value="3" title="调节太阳光照强度">
      <label>太阳</label>
      <input type="range" id="sunBrightnessSlider" min="0" max="100" step="1" value="40" title="调节太阳视觉亮度">
      <label>环境光</label>
      <input type="range" id="ambientSlider" min="0" max="2" step="0.05" value="0" title="调节环境光强度（背阳面亮度）">
    </div>
  </div>
  <div id="info-overlay">拖拽鼠标旋转 · 滚轮缩放</div>
  <div id="camera-mode">
    <button id="modeWorld" class="active" title="世界坐标系">世界</button>
    <button id="modeGeo" title="地心天球坐标系">地心</button>
    <button id="modeSeleno" title="月心天球坐标系">月心</button>
    <button id="modeEarthSurf" title="地球表面选点">地表</button>
    <button id="modeMoonSurf" title="月球表面选点">月表</button>
  </div>
  <div id="surface-select-bar">
    <div id="preset-selector">
      <select id="preset-earth" style="display:none"><option value="">— 选择城市 —</option></select>
      <select id="preset-moon" style="display:none"><option value="">— 选择月面坐标 —</option></select>
    </div>
    <div id="select-hint">点击天体表面选点</div>
  </div>
  <div id="coord-display"></div>
  <div id="surface-compass">
    <div class="arrow"></div>
    <div class="n">北</div>
    <div class="s">南</div>
    <div class="e">东</div>
    <div class="w">西</div>
  </div>
  <div id="confirm-btn">确认选点</div>
  <div id="debug-overlay">
    <span class="label">坐标</span> <span id="dbg-coord"></span><br>
    <span class="label">日期</span> <span id="dbg-date"></span><br>
    <span class="label">太阳高度</span> <span id="dbg-sun-alt"></span><br>
    <span class="label">太阳方位</span> <span id="dbg-sun-az"></span><br>
    <span class="label" id="dbg-target-alt-label">月亮高度</span> <span id="dbg-target-alt"></span><br>
    <span class="label" id="dbg-target-az-label">月亮方位</span> <span id="dbg-target-az"></span><br>
    <span class="label">相机俯仰</span> <span id="dbg-camalt"></span><br>
    <span class="label">相机偏航</span> <span id="dbg-yaw"></span><br>
    <span class="label">autoTrack</span> <span id="dbg-track"></span>
    <div style="margin-top:3px">
      <button id="track-off" class="tkbtn" style="font-size:10px;padding:1px 5px">关</button>
      <button id="track-sun" class="tkbtn" style="font-size:10px;padding:1px 5px">日</button>
      <button id="track-body" class="tkbtn" style="font-size:10px;padding:1px 5px">月</button>
    </div>
  </div>
  <div id="focus-btns">
    <button id="focusSun">太阳</button>
    <button id="focusEarth">地球</button>
    <button id="focusMoon">月球</button>
    <button id="focus-mercury">水星</button>
    <button id="focus-venus">金星</button>
    <button id="focus-mars">火星</button>
    <button id="focus-jupiter">木星</button>
    <button id="focus-saturn">土星</button>
    <button id="focus-uranus">天王星</button>
    <button id="focus-neptune">海王星</button>
  </div>
  <div id="plane-toggle">
    <label><input type="checkbox" id="chkEcliptic"> 黄道面</label>
    <label><input type="checkbox" id="chkEquator"> 赤道面</label>
    <label><input type="checkbox" id="chkPlanetOrbits" checked> 行星轨道</label>
    <label><input type="checkbox" id="chkSeasonMarkers" checked> 节气标志</label>
  </div>
  <div id="season-btns">
    <button id="btnSpring">春分</button>
    <button id="btnSummer">夏至</button>
    <button id="btnAutumn">秋分</button>
    <button id="btnWinter">冬至</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./three_modules/three/three.module.js",
      "three/addons/": "./three_modules/three/addons/"
    }
  }
  </script>
  <script src="astronomy.browser.min.js"></script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ============================================================
    // Constants
    // ============================================================
    const AU = 149597870700;
    let currentYear = 2025;
    let YEAR_START = computeVernalEquinox(currentYear);
    const DAY_MS = 86400000;
    function computeVernalEquinox(year) {
      const s = Astronomy.Seasons(year);
      return new Date(s.mar_equinox.date.getTime());
    }

    // Coordinate mapping: astronomy (X=ecliptic, Y=ecliptic, Z=north)
    //                    → Three.js (X=right, Y=up-out-of-plane, Z=ecliptic)
    // Earth orbits in the Three.js XZ plane, camera above (Y+)

    const EARTH_SCALE = 12;     // 1 real AU → 12 Three.js units
    const MOON_VISUAL = 1.8;    // visual Earth-Moon distance in Three.js units
    const MOON_REAL_AU = 384400000 / AU; // ≈ 0.00257 AU
    const MOON_SCALE = MOON_VISUAL / MOON_REAL_AU; // ≈ 700× real

    const SUN_R = 0.3;
    const EARTH_R = 0.5;
    const MOON_R = 0.18;
    const SURFACE_VISUAL_R_EARTH = 10;
    const SURFACE_VISUAL_R_MOON = 3.6;

    // Real‑scale constants for Earth‑surface mode (1 unit = 1 Earth radius)
    const REAL_EARTH_R = 1;
    const REAL_MOON_R = 1.365;       // Moon radius (5× real = 1.365 Earth radii)
    const REAL_MOON_DIST = 60.3;     // Earth–Moon distance in Earth radii
    const REAL_SUN_DIST = 23480;     // Earth–Sun distance in Earth radii
    const REAL_SUN_ANGULAR = 0.04625; // Sun angular size 2.65° in radians (5× real)

    // ── Planet visual config (not to scale, purely for visual demonstration) ──
    const PLANET_CONFIGS = [
      { key: 'Mercury', label: '水星', radius: 0.12, color: 0xb5b5b5, tex: 'mercury.jpg' },
      { key: 'Venus',   label: '金星', radius: 0.25, color: 0xe8cda0, tex: 'venus.jpg' },
      { key: 'Mars',    label: '火星', radius: 0.22, color: 0xc1440e, tex: 'mars.jpg' },
      { key: 'Jupiter', label: '木星', radius: 1.50, color: 0xd4a574, tex: 'jupiter.jpg' },
      { key: 'Saturn',  label: '土星', radius: 1.20, color: 0xead6b8, tex: 'saturn.jpg' },
      { key: 'Uranus',  label: '天王星', radius: 0.80, color: 0xd1e7e7, tex: 'uranus.jpg' },
      { key: 'Neptune', label: '海王星', radius: 0.70, color: 0x5b5ddf, tex: 'neptune.jpg' },
    ];

    // ============================================================
    // Renderer
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;
    document.getElementById('container').appendChild(renderer.domElement);

    // ============================================================
    // Scene
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000008);

    // ============================================================
    // Camera
    // ============================================================
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 1000);
    camera.position.set(0, 28, 0);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 0.3;
    controls.maxDistance = 200;
    controls.maxPolarAngle = Math.PI * 0.75;
    controls.rotateSpeed = 0.3;
    controls.minPolarAngle = 0.1;
    controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.DOLLY };
    controls.update();

    // ============================================================
    // Lighting — PointLight at Sun + ambient + hemisphere fill
    // ============================================================
    const sunLight = new THREE.PointLight(0xffffff, 3, 0, 0);
    scene.add(sunLight);
    const ambientLight = new THREE.AmbientLight(0x445566, 0);
    scene.add(ambientLight);
    const hemiLight = new THREE.HemisphereLight(0x334466, 0x222222, 0);
    scene.add(hemiLight);

    // DirectionalLight for surface visual sphere (parallel sunlight)
    const surfaceDirLight = new THREE.DirectionalLight(0xffffff, 2.5);
    surfaceDirLight.visible = false;
    scene.add(surfaceDirLight);
    const surfaceDirTarget = new THREE.Object3D();
    surfaceDirTarget.position.set(0, 0, 0);
    scene.add(surfaceDirTarget);
    surfaceDirLight.target = surfaceDirTarget;

    // ============================================================
    // Sun — procedural texture + glow sprite
    // ============================================================
    const sunGeo = new THREE.SphereGeometry(SUN_R, 64, 64);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xffeebb });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    // Generate procedural sun surface texture
    {
      const c = document.createElement('canvas'); c.width = 512; c.height = 256;
      const ctx = c.getContext('2d');
      const id = ctx.createImageData(512, 256);
      for (let y = 0; y < 256; y++) {
        for (let x = 0; x < 512; x++) {
          const i = (y * 512 + x) * 4;
          const n1 = Math.sin(x * 0.05 + y * 0.03) * 0.5 + 0.5;
          const n2 = Math.sin(x * 0.12 - y * 0.08 + 3.1) * 0.5 + 0.5;
          const n3 = Math.sin(x * 0.02 + y * 0.06 + 7.7) * 0.5 + 0.5;
          const v = (n1 * 0.5 + n2 * 0.3 + n3 * 0.2);
          const bright = 200 + v * 55;
          id.data[i]   = Math.min(255, bright + 30);
          id.data[i+1] = Math.min(255, bright - 10);
          id.data[i+2] = Math.min(255, bright - 80);
          id.data[i+3] = 255;
        }
      }
      ctx.putImageData(id, 0, 0);
      sunMat.map = new THREE.CanvasTexture(c);
      sunMat.needsUpdate = true;
    }
    scene.add(sunMesh);

    // Glow sprite (additive) — larger than the sphere
    let sunGlowMat;
    (() => {
      const c = document.createElement('canvas'); c.width = 256; c.height = 256;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      g.addColorStop(0,   'rgba(255,245,200,1)');
      g.addColorStop(0.12,'rgba(255,210,60,0.95)');
      g.addColorStop(0.3, 'rgba(255,130,30,0.55)');
      g.addColorStop(0.6, 'rgba(255,70,10,0.15)');
      g.addColorStop(1,   'rgba(255,0,0,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
      const tex = new THREE.CanvasTexture(c);
      sunGlowMat = new THREE.SpriteMaterial({
        map: tex,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: true,
      });
      const glow = new THREE.Sprite(sunGlowMat);
      glow.scale.set(3, 3, 1);
      sunMesh.add(glow);
    })();

    // ============================================================
    // Earth
    // ============================================================
    const earthGeo = new THREE.SphereGeometry(EARTH_R, 64, 64);
    const earthMat = new THREE.MeshLambertMaterial();
    const earthMesh = new THREE.Mesh(earthGeo, earthMat);
    const EARTH_TILT = 23.44 * Math.PI / 180;
    // Quaternion-based rotation: tilt around X then rotate around the TILTED Y axis.
    // This keeps the Earth's rotation axis FIXED in space (no wobble).
    const TILT_QUAT = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), EARTH_TILT);
    const TILTED_Y = new THREE.Vector3(0, 1, 0).applyQuaternion(TILT_QUAT);
    scene.add(earthMesh);

    // Latitude lines on Earth surface (equator, tropics)
    function makeLatLine(latDeg, color, radius) {
      const lat = latDeg * Math.PI / 180;
      const r = EARTH_R * Math.cos(lat) + 0.005;
      const y = EARTH_R * Math.sin(lat);
      const pts = [];
      for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        pts.push(new THREE.Vector3(r * Math.cos(a), y, r * Math.sin(a)));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      return new THREE.Line(geo, new THREE.LineBasicMaterial({ color, linewidth: 2, depthTest: true }));
    }
    earthMesh.add(makeLatLine(0, 0x44ddff, EARTH_R));        // Equator
    earthMesh.add(makeLatLine(23.44, 0xffaa44, EARTH_R));    // Tropic of Cancer
    earthMesh.add(makeLatLine(-23.44, 0xffaa44, EARTH_R));   // Tropic of Capricorn

    // Collect markers that should be hidden in surface mode

    // ============================================================

    const subsolarDot = new THREE.Mesh(

    // ============================================================
    // Earth orbit — sampled from astronomy engine (exact match)
    // ============================================================
    let earthOrbitLine;
    function rebuildOrbitLine() {
      if (earthOrbitLine) {
        if (earthOrbitLine.parent) earthOrbitLine.parent.remove(earthOrbitLine);
        earthOrbitLine.geometry.dispose();
        earthOrbitLine.material.dispose();
      }
      const geo = new THREE.BufferGeometry();
      const mat = new THREE.LineBasicMaterial({ color: 0x4466aa, transparent: true, opacity: 0.35, depthTest: true });
      earthOrbitLine = new THREE.Line(geo, mat);
      scene.add(earthOrbitLine);
      const cosObl = Math.cos(EARTH_TILT);
      const sinObl = Math.sin(EARTH_TILT);
      const pts = [];
      for (let d = 0; d <= 365; d++) {
        const t = new Astronomy.AstroTime(new Date(YEAR_START.getTime() + d * DAY_MS));
        const v = Astronomy.HelioVector(Astronomy.Body.Earth, t);
        const eX = v.x;
        const eY = v.y * cosObl + v.z * sinObl;
        const eZ = -v.y * sinObl + v.z * cosObl;
        pts.push(new THREE.Vector3(eX * EARTH_SCALE, eZ * EARTH_SCALE, eY * EARTH_SCALE));
      }
      geo.setFromPoints(pts);

    rebuildOrbitLine();

    // ── Planet orbit lines ──
    let planetData = [];
    function rebuildPlanetOrbitLines() {
      for (const pd of planetData) {
        if (pd.orbitLine) {
          if (pd.orbitLine.parent) pd.orbitLine.parent.remove(pd.orbitLine);
          pd.orbitLine.geometry.dispose();
          pd.orbitLine.material.dispose();
        }

      const cosObl = Math.cos(EARTH_TILT);
      const sinObl = Math.sin(EARTH_TILT);
      for (const pd of planetData) {
        const geo = new THREE.BufferGeometry();
        const mat = new THREE.LineBasicMaterial({ color: pd.config.color, transparent: true, opacity: 0.25, depthTest: true });
        pd.orbitLine = new THREE.Line(geo, mat);
        scene.add(pd.orbitLine);
        pd.orbitLine.visible = document.getElementById('chkPlanetOrbits').checked;
        const period = Astronomy.PlanetOrbitalPeriod(Astronomy.Body[pd.config.key]);
        const steps = Math.min(360, Math.max(60, Math.round(period)));
        const pts = [];
        for (let i = 0; i <= steps; i++) {
          const d = (i / steps) * period;
          const t = new Astronomy.AstroTime(new Date(YEAR_START.getTime() + d * DAY_MS));
          const v = Astronomy.HelioVector(Astronomy.Body[pd.config.key], t);
          const eX = v.x;
          const eY = v.y * cosObl + v.z * sinObl;
          const eZ = -v.y * sinObl + v.z * cosObl;
          pts.push(new THREE.Vector3(eX * EARTH_SCALE, eZ * EARTH_SCALE, eY * EARTH_SCALE));
        }
        geo.setFromPoints(pts);
      }
    }

    // ============================================================
    // Earth rotation axis (23.44° tilt) — scene-level, synced to Earth
    // ============================================================
    const earthAxisLen = EARTH_R * 3.5;
    const earthAxisGeo = new THREE.BufferGeometry().setFromPoints([

    const earthAxis = new THREE.Line(earthAxisGeo,

    // Load Earth texture

    // Surface Earth sphere (real‑scale in Earth‑surface mode, 1 unit = 1 Earth radius)

    // ============================================================

    const moonOrbitGeo = new THREE.BufferGeometry();

    // ============================================================

    // ============================================================
    const moonAxisLen = MOON_R * 3.5;
    const moonAxisGeo = new THREE.BufferGeometry().setFromPoints([

    texLoader.load(

    // Moon phase sprite (for earthSurface mode — shows moon phase in the sky)

    // Surface visual Moon sphere (for moonSurface mode)
    const surfaceMoonGeo = new THREE.SphereGeometry(SURFACE_VISUAL_R_MOON, 128, 128);
    const surfaceMoonMat = new THREE.MeshStandardMaterial({

    scene.add(surfaceMoonMesh);
    texLoader.load(

      (tex) => { surfaceMoonMat.map = tex; surfaceMoonMat.needsUpdate = true; },

      (e) => { console.warn('Surface Moon texture failed:', e); }

    // Real‑scale Moon sphere for Earth‑surface mode (radius = 0.273 Earth radii)
    const surfaceMoonRealGeo = new THREE.SphereGeometry(REAL_MOON_R, 48, 48);
    const surfaceMoonRealMat = new THREE.MeshStandardMaterial({ roughness: 0.9, metalness: 0.0 });
    const surfaceMoonRealMesh = new THREE.Mesh(surfaceMoonRealGeo, surfaceMoonRealMat);
    surfaceMoonRealMesh.visible = false;
    scene.add(surfaceMoonRealMesh);
    texLoader.load(
      'moon_1024.jpg',
      (tex) => { surfaceMoonRealMat.map = tex; surfaceMoonRealMat.needsUpdate = true; },

      (e) => { console.warn('Real Moon texture failed:', e); }
    );

    // ── Planet meshes ──
    for (const cfg of PLANET_CONFIGS) {
      const geo = new THREE.SphereGeometry(cfg.radius, 32, 32);
      const mat = new THREE.MeshLambertMaterial();
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      texLoader.load(cfg.tex, (tex) => { mat.map = tex; mat.needsUpdate = true; }, undefined, (e) => console.warn(cfg.label + ' texture failed:', e));
      let ringMesh = null;
      if (cfg.key === 'Saturn') {

        const rMat = new THREE.MeshBasicMaterial({ color: 0xc8b89a, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
        ringMesh = new THREE.Mesh(rGeo, rMat);
        ringMesh.rotation.x = -Math.PI / 2 + 26.7 * Math.PI / 180;
        mesh.add(ringMesh);
      }
      planetData.push({ config: cfg, mesh, orbitLine: null, orbitGeo: null });

    rebuildPlanetOrbitLines();

    // ============================================================
    // Starfield — random sphere distribution (enhanced)
    // ============================================================
    let starfield = (() => {
      const count = 5000;
      const pos = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = 80 + Math.random() * 420;
        const th = Math.random() * Math.PI * 2;
        const ph = Math.acos(2 * Math.random() - 1);
        pos[i*3]   = r * Math.cos(th) * Math.sin(ph);
        pos[i*3+1] = r * Math.sin(th) * Math.sin(ph);
        pos[i*3+2] = r * Math.cos(ph);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const pts = new THREE.Points(geo, new THREE.PointsMaterial({
        color: 0xffffff, size: 0.4, sizeAttenuation: false, depthWrite: false,
        transparent: true, opacity: 1,
      }));
      scene.add(pts);
      return pts;
    })();

    // Sky removed per user request — scene background (0x000008) + starfield

    // ============================================================
    // Ecliptic plane (XZ plane at Y=0)
    // ============================================================
    const eclipticPlane = new THREE.Mesh(
      new THREE.CircleGeometry(EARTH_SCALE * 1.2, 128),
      new THREE.MeshBasicMaterial({ color: 0x4466aa, transparent: true, opacity: 0.06, side: THREE.DoubleSide, depthWrite: false })
    );
    eclipticPlane.rotation.x = -Math.PI / 2;
    eclipticPlane.visible = false;
    scene.add(eclipticPlane);

    // ============================================================
    // Equatorial plane (tilted 23.44° from ecliptic)
    // ============================================================
    const equatorPlane = new THREE.Mesh(
      new THREE.CircleGeometry(EARTH_R * 2.5, 128),
      new THREE.MeshBasicMaterial({ color: 0x44ddff, transparent: true, opacity: 0.08, side: THREE.DoubleSide, depthWrite: false })
    );
    equatorPlane.rotation.x = -Math.PI / 2 + EARTH_TILT;
    equatorPlane.visible = false;
    scene.add(equatorPlane);

    // ============================================================
    // Season markers — cones + text labels
    // ============================================================
    const seasonNames = ['春分', '夏至', '秋分', '冬至'];
    const seasonColors = [0x44ff88, 0xff6644, 0xddaa44, 0x4488ff];
    let seasonMarkers = [];
    function rebuildSeasonMarkers() {
      for (const { cone, sprite } of seasonMarkers) {
        if (cone.parent) cone.parent.remove(cone);
        cone.geometry.dispose();
        cone.material.dispose();
        if (sprite.parent) sprite.parent.remove(sprite);
        sprite.material.map?.dispose();
        sprite.material.dispose();
      }
      seasonMarkers = [];
      const seasonDays = getSeasonOffsets(currentYear);
      for (let i = 0; i < 4; i++) {
        const t = new Astronomy.AstroTime(new Date(YEAR_START.getTime() + seasonDays[i] * DAY_MS));
        const v = Astronomy.HelioVector(Astronomy.Body.Earth, t);
        const pos = new THREE.Vector3(v.x * EARTH_SCALE, 0, v.y * EARTH_SCALE);

        const cone = new THREE.Mesh(
          new THREE.ConeGeometry(0.2, 0.5, 3),
          new THREE.MeshBasicMaterial({ color: seasonColors[i] })
        );
        cone.position.copy(pos);
        cone.position.y = 0.3;
        scene.add(cone);

        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 64;
        const ctx = canvas.getContext('2d');

        ctx.font = 'bold 36px sans-serif';
        ctx.fillStyle = '#' + seasonColors[i].toString(16).padStart(6, '0');
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(seasonNames[i], 64, 32);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({

        sprite.position.y = 0.9;
        sprite.scale.set(1.2, 0.6, 1);
        scene.add(sprite);
        const smVis = document.getElementById('chkSeasonMarkers').checked;
        cone.visible = smVis;
        sprite.visible = smVis;
        seasonMarkers.push({ cone, sprite });
      }
    }
    rebuildSeasonMarkers();

    // ============================================================
    // Post-processing — bloom on Sun only
    // ============================================================
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.3,   // strength
      0.5,   // radius
      0.85   // threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ============================================================
    // Orbit math
    // ============================================================
    function getAstroTime() {
      const d = new Date(YEAR_START.getTime() + simDayOffset * DAY_MS);
      return new Astronomy.AstroTime(d);
    }

    function updateBodies() {
      const at = getAstroTime();
      const ev = Astronomy.HelioVector(Astronomy.Body.Earth, at);
      const mv = Astronomy.HelioVector(Astronomy.Body.Moon, at);

      // Convert equatorial J2000 (from astronomy lib) to ecliptic J2000
      // by rotating -EARTH_TILT around X axis
      const cosObl = Math.cos(EARTH_TILT);
      const sinObl = Math.sin(EARTH_TILT);
      const evEclX = ev.x;
      const evEclY = ev.y * cosObl + ev.z * sinObl;
      const evEclZ = -ev.y * sinObl + ev.z * cosObl;

      earthMesh.position.set(
        evEclX * EARTH_SCALE,
        evEclZ * EARTH_SCALE,  // out-of-ecliptic → Y
        evEclY * EARTH_SCALE   // in-ecliptic → Z
      );

      // Earth daily rotation — uses Astronomy library to compute a quaternion
      // that aligns the subsolar point's local normal with the actual Sun
      // direction.  This correctly handles all solar declinations (the old
      // linear model was off by ~180° at solstices).
      try {
        const eq = Astronomy.Equator(Astronomy.Body.Sun, at, new Astronomy.Observer(0, 0, 0), true, true);
        const decRad = eq.dec * Math.PI / 180;
        const raDeg = eq.ra * 15;
        const gstDeg = Astronomy.SiderealTime(at) * 15;
        let ssLonDeg = raDeg - gstDeg;
        if (ssLonDeg > 180) ssLonDeg -= 360;
        else if (ssLonDeg < -180) ssLonDeg += 360;
        const ssLonRad = ssLonDeg * Math.PI / 180;
        const cDec = Math.cos(decRad);
        const localNormal = new THREE.Vector3(
          Math.cos(ssLonRad) * cDec, Math.sin(decRad), -Math.sin(ssLonRad) * cDec
        ).applyQuaternion(TILT_QUAT);
        const sunDir = earthMesh.position.clone().negate().normalize();
        const projNormal = localNormal.clone().sub(
          TILTED_Y.clone().multiplyScalar(localNormal.dot(TILTED_Y))
        ).normalize();
        const projSunDir = sunDir.clone().sub(
          TILTED_Y.clone().multiplyScalar(sunDir.dot(TILTED_Y))
        ).normalize();
        const angle = Math.acos(Math.max(-1, Math.min(1, projNormal.dot(projSunDir))));
        const cross = new THREE.Vector3().crossVectors(projNormal, projSunDir);
        const sign = cross.dot(TILTED_Y) >= 0 ? 1 : -1;
        const dailyQuat = new THREE.Quaternion().setFromAxisAngle(TILTED_Y, sign * angle);
        earthMesh.quaternion.copy(dailyQuat.multiply(TILT_QUAT));
      } catch (e) {
        console.warn('Astronomy rotation failed, using linear fallback:', e);
        const fallbackAngle = 313.7 * Math.PI / 180 - simDayOffset * 2 * Math.PI * 1.002737909350795;
        const fbQuat = new THREE.Quaternion().setFromAxisAngle(TILTED_Y, fallbackAngle);
        earthMesh.quaternion.copy(fbQuat.multiply(TILT_QUAT));
      }

      // Sync Earth axis to Earth position
      earthAxis.position.copy(earthMesh.position);
      equatorPlane.position.copy(earthMesh.position);

      // Moon relative to Earth
      const mvEclX = mv.x;
      const mvEclY = mv.y * cosObl + mv.z * sinObl;
      const mvEclZ = -mv.y * sinObl + mv.z * cosObl;
      moonMesh.position.set(
        earthMesh.position.x + (mvEclX - evEclX) * MOON_SCALE,
        earthMesh.position.y + (mvEclZ - evEclZ) * MOON_SCALE,
        earthMesh.position.z + (mvEclY - evEclY) * MOON_SCALE
      );

      // Moon tidal locking: point -Z axis toward Earth in 3D, then add axial tilt
      const earthDir = new THREE.Vector3()
        .subVectors(earthMesh.position, moonMesh.position)
        .normalize();
      // Build quaternion from orthonormal basis to avoid setFromUnitVectors 180° singularity
      const targetNegZ = earthDir.clone();
      const upRef = new THREE.Vector3(0, 1, 0);
      if (Math.abs(targetNegZ.dot(upRef)) > 0.9999) upRef.set(1, 0, 0);
      const basisX = new THREE.Vector3().crossVectors(upRef, targetNegZ).normalize();
      const basisY = new THREE.Vector3().crossVectors(targetNegZ, basisX).normalize();
      const basisMat = new THREE.Matrix4().makeBasis(basisX, basisY, targetNegZ);
      moonMesh.quaternion.setFromRotationMatrix(basisMat);
      const tiltAxis = new THREE.Vector3(1, 0, 0).applyQuaternion(moonMesh.quaternion);
      moonMesh.quaternion.multiply(
        new THREE.Quaternion().setFromAxisAngle(tiltAxis, MOON_TILT)
      );
      // Ensure frame-to-frame quaternion continuity (avoid sign flip at degeneracy)
      if (moonMesh.quaternion.dot(_prevMoonQuat) < 0) {
        moonMesh.quaternion.set(-moonMesh.quaternion.x, -moonMesh.quaternion.y, -moonMesh.quaternion.z, -moonMesh.quaternion.w);
      }
      _prevMoonQuat.copy(moonMesh.quaternion);

      // Moon orbit follows Earth — sample 28 days of path
      const moonPts = [];
      for (let d = 0; d <= 28; d++) {
        const t = new Astronomy.AstroTime(new Date(YEAR_START.getTime() + (simDayOffset + d) * DAY_MS));
        const mve = Astronomy.HelioVector(Astronomy.Body.Moon, t);
        const eve = Astronomy.HelioVector(Astronomy.Body.Earth, t);
        const dX = mve.x - eve.x;
        const dY = mve.y - eve.y;
        const dZ = mve.z - eve.z;
        const eclY = dY * cosObl + dZ * sinObl;
        const eclZ = -dY * sinObl + dZ * cosObl;
        moonPts.push(new THREE.Vector3(
          dX * MOON_SCALE,
          eclZ * MOON_SCALE,
          eclY * MOON_SCALE
        ));
      }
      moonOrbitGeo.setFromPoints(moonPts);
      moonOrbitLine.position.copy(earthMesh.position);

      // Show Moon orbit only when camera is close enough and not in confirmed surface mode
      const camDist = camera.position.length();
      moonOrbitLine.visible = camDist < 40 && !surfaceConfirmed;

      // Subsolar point: Sun direction in Earth's local frame
      const sunDir = sunMesh.position.clone().sub(earthMesh.position).normalize();
      const invQuat = earthMesh.quaternion.clone().invert();
      const localSunDir = sunDir.applyQuaternion(invQuat).normalize();
      subsolarDot.position.copy(localSunDir.clone().multiplyScalar(EARTH_R + 0.005));
      subsolarDot.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), localSunDir);

      // Sync surface visual meshes (Earth and Moon visual spheres always synced)
      surfaceEarthMesh.position.copy(earthMesh.position);
      surfaceEarthMesh.quaternion.copy(earthMesh.quaternion);
      surfaceMoonMesh.position.copy(moonMesh.position);
      surfaceMoonMesh.quaternion.copy(moonMesh.quaternion);

      // Real‑scale sky bodies: position based on camera mode
      const moonDir = new THREE.Vector3().subVectors(moonMesh.position, earthMesh.position).normalize();
      if (cameraMode === 'earthSurface') {
        // Earth surface: Moon in the sky at real distance
        surfaceMoonRealMesh.position.copy(earthMesh.position).add(moonDir.clone().multiplyScalar(REAL_MOON_DIST));
        surfaceMoonRealMesh.quaternion.copy(moonMesh.quaternion);
      } else if (cameraMode === 'moonSurface') {
        // Moon surface: Earth in the sky at real distance
        surfaceEarthMesh.position.copy(moonMesh.position).sub(moonDir.clone().multiplyScalar(REAL_MOON_DIST));
        surfaceEarthMesh.quaternion.copy(earthMesh.quaternion);
        surfaceEarthMesh.visible = true;
      } else {
        // Neither: keep Moon real mesh at default (for world/geocentric/seleno views)
        surfaceMoonRealMesh.position.copy(earthMesh.position).add(moonDir.clone().multiplyScalar(REAL_MOON_DIST));
        surfaceMoonRealMesh.quaternion.copy(moonMesh.quaternion);
      }

      // Update directional light target to current surface body
      const lightTarget = (cameraMode === 'moonSurface') ? moonMesh.position : earthMesh.position;
      const lightBodyPos = lightTarget.clone().normalize();
      surfaceDirLight.position.copy(lightBodyPos.clone().negate().multiplyScalar(500));
      surfaceDirTarget.position.copy(lightTarget);

      // Planet positions
      for (const pd of planetData) {
        const pv = Astronomy.HelioVector(Astronomy.Body[pd.config.key], at);
        const pX = pv.x;
        const pY = pv.y * cosObl + pv.z * sinObl;
        const pZ = -pv.y * sinObl + pv.z * cosObl;
        pd.mesh.position.set(pX * EARTH_SCALE, pZ * EARTH_SCALE, pY * EARTH_SCALE);
      }

    }

    // ============================================================
    // Timeline state
    // ============================================================
    const playBtn   = document.getElementById('playBtn');
    const timeline  = document.getElementById('timeline');
    const dateDispl = document.getElementById('dateDisplay');
    const speedSel  = document.getElementById('speedSelect');
    const speedDisp = document.getElementById('speedDisplay');
    const customSpeed = document.getElementById('customSpeed');

    let playing = false;
    let simDayOffset = 0;    // days since vernal equinox start
    let lastFrame = performance.now();

    function getSpeedDaysPerSec() {
      if (speedSel.value === '__custom__') {
        return parseFloat(customSpeed.value) / 1440;
      }
      return parseFloat(speedSel.value);
    }

    function updateUISpeed() {
      const isCustom = speedSel.value === '__custom__';

      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.font = `bold ${fontSize || 36}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, 128, 64);
      ctx.fillStyle = color;
      ctx.fillText(text, 64, 32);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      const mat = new THREE.SpriteMaterial({
        map: tex,
        transparent: true,
        depthTest: false,
      });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.8, 0.4, 1);
      return sprite;
    }

      surfaceCompassLabels = [];
      for (const line of surfaceTickLines) {

      surfaceTickLines = [];
      surfaceTickData = [];

    function onCanvasClick(e) {
      if (cameraMode !== 'earthSurface' && cameraMode !== 'moonSurface') return;
      if (surfaceConfirmed) return; // already confirmed, don't re-select
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const targetMesh = surfaceBody === 'earth' ? earthMesh : moonMesh;
      const R = surfaceBody === 'earth' ? EARTH_R : MOON_R;
      const hits = raycaster.intersectObject(targetMesh, false);
      if (hits.length === 0) return;
      // Only accept mesh intersections, not line children
      if (hits[0].object !== targetMesh) return;

      const localPt = targetMesh.worldToLocal(hits[0].point.clone());
      surfaceLat = Math.asin(Math.min(1, Math.max(-1, localPt.y / R)));
      surfaceLon = Math.atan2(-localPt.z, localPt.x);

      // Place flag on surface
      if (surfaceFlag) surfaceFlag.parent.remove(surfaceFlag);
      const flagColor = surfaceBody === 'earth' ? 0x44ff88 : 0xffaa44;
      surfaceFlag = createFlag(flagColor);
      const cLat = Math.cos(surfaceLat);
      const flagPos = new THREE.Vector3(
        R * Math.cos(surfaceLon) * cLat,
        R * Math.sin(surfaceLat),
        -R * Math.sin(surfaceLon) * cLat
      );
      surfaceFlag.position.copy(flagPos);
      // Orient flag to point outward from surface
      surfaceFlag.lookAt(flagPos.clone().multiplyScalar(2));
      targetMesh.add(surfaceFlag);

      const latDeg = (surfaceLat * 180 / Math.PI).toFixed(1);
      const lonDeg = (surfaceLon * 180 / Math.PI).toFixed(1);
      confirmBtn.style.display = 'block';
    }

          (cameraMode === 'earthSurface' || cameraMode === 'moonSurface') && surfaceConfirmed) {
        const dbg = window.__dbg;
        console.log('=== Debug Dump ===');
        console.log(JSON.parse(JSON.stringify(dbg)));
        console.log(`spriteOnScreen: ${spriteOnScreen}, spriteScreen: (${spriteScreenX.toFixed(4)}, ${spriteScreenY.toFixed(4)}, ${spriteScreenZ.toFixed(4)})`);
        console.log(`camera pos:`, camera.position.toArray().map(v => v.toFixed(4)));
        console.log(`camera fov: ${camera.fov}, near: ${camera.near}, far: ${camera.far}`);
        const sp = surfaceSunSprite;
        if (sp && sp.parent) {
          const sw = new THREE.Vector3();
          sp.getWorldPosition(sw);
          console.log(`sprite world pos:`, sw.toArray().map(v => v.toFixed(4)));
        }
      }
    });

    // Scroll wheel for zoom level in surface mode
    renderer.domElement.addEventListener('wheel', (e) => {
      if (cameraMode !== 'earthSurface' && cameraMode !== 'moonSurface') return;
      if (!surfaceConfirmed) return;
      e.preventDefault();
      surfaceFov *= e.deltaY > 0 ? 1.05 : 0.95;
      surfaceFov = Math.max(10, Math.min(90, surfaceFov));
      camera.fov = surfaceFov;
      camera.updateProjectionMatrix();
    }, { passive: false });

    // Confirm selection — enter surface view mode
    confirmBtn.addEventListener('click', () => {
      surfaceConfirmed = true;
      confirmBtn.style.display = 'none';
      document.getElementById('surface-select-bar').style.display = 'none';

      controls.enabled = false;
      camera.fov = 30;
      camera.zoom = 1;
      surfaceFov = 30;

      const isEarth = surfaceBody === 'earth';
      let targetMesh, visualMesh, VISUAL_R, REAL_R;
      if (isEarth) {
        targetMesh = earthMesh;
        visualMesh = surfaceEarthMesh;
        VISUAL_R = REAL_EARTH_R;
        REAL_R = REAL_EARTH_R;
      } else {
        targetMesh = moonMesh;
        visualMesh = surfaceMoonRealMesh;
        VISUAL_R = REAL_MOON_R;
        REAL_R = REAL_MOON_R;
      }
      camera.near = 1e-5;
      camera.far = 30000;
      camera.updateProjectionMatrix();

      const EYE_HEIGHT = Math.max(VISUAL_R * 1.57e-5, camera.near * 1.5);

      // Sync visual mesh to real body
      visualMesh.position.copy(targetMesh.position);
      visualMesh.quaternion.copy(targetMesh.quaternion);

      // Toggle visibility
      targetMesh.visible = false;
      visualMesh.visible = true;
      sunMesh.visible = false;
      earthOrbitLine.visible = false;
      moonOrbitLine.visible = false;
      for (const pd of planetData) { pd.mesh.visible = false; if (pd.orbitLine) pd.orbitLine.visible = false; }
      earthAxis.visible = false;
      sunLight.visible = false;
      surfaceDirLight.visible = true;
      for (const obj of surfaceHiddenLabels) obj.visible = false;
      equatorPlane.visible = false;
      for (const { cone, sprite } of seasonMarkers) {
        cone.visible = false;
        sprite.visible = false;
      }
      // Bloom on in real‑scale modes, off for legacy
      bloomPass.enabled = true;

      const compass = document.getElementById('surface-compass');
      compass.style.display = 'block';
      // Hide the body we stand on, show real-scale sky bodies
      if (isEarth) {
        moonMesh.visible = false;
        moonPhaseSprite.visible = false;
        surfaceMoonRealMesh.visible = true;
        surfaceMoonMesh.visible = false;
        surfaceEarthMesh.visible = true; // already on as visualMesh
      } else {
        earthMesh.visible = false;
        moonPhaseSprite.visible = false;
        surfaceEarthMesh.visible = true; // Earth in the Moon sky
        surfaceMoonMesh.visible = false;
        surfaceMoonRealMesh.visible = true; // already on as visualMesh
      }

      const cLat = Math.cos(surfaceLat);
      const surfLocal = new THREE.Vector3(
        VISUAL_R * Math.cos(surfaceLon) * cLat,
        VISUAL_R * Math.sin(surfaceLat),
        -VISUAL_R * Math.sin(surfaceLon) * cLat
      );
      const normal = surfLocal.clone().normalize();
      const up = normal.clone();

      const locNorth = new THREE.Vector3(0, 1, 0);
      const east = new THREE.Vector3().crossVectors(locNorth, up).normalize();
      if (east.lengthSq() < 0.001) east.set(0, 0, 1).cross(up).normalize();
      const north = new THREE.Vector3().crossVectors(up, east).normalize();

      // Observer = camera = visual sphere (no parallax in real scale)
      const surfCelestialLocal = surfLocal.clone().multiplyScalar(REAL_R / VISUAL_R);
      // Auto-orient toward the Sun
      const sunLocal = visualMesh.worldToLocal(sunMesh.position.clone()).sub(surfCelestialLocal);
      const sunDir = sunLocal.clone().normalize();
      const sunHoriz = sunDir.clone().sub(up.clone().multiplyScalar(sunDir.dot(up))).normalize();

      if (sunHoriz.lengthSq() > 0.001) {
        const yawToSun = Math.atan2(
          up.dot(north.clone().cross(sunHoriz)),
          north.dot(sunHoriz)
        );
        surfaceYaw = yawToSun;
      } else {
        surfaceYaw = 0;
      }

      const sunAlt = Math.asin(Math.max(-1, Math.min(1, sunDir.dot(up))));
      surfacePitch = Math.max(0.0, Math.min(Math.PI / 2 - 0.01, sunAlt));
      surfaceAutoTrack = 'sun';

      // Create horizon ring
      if (surfaceHorizonRing) {
        if (surfaceHorizonRing.parent) surfaceHorizonRing.parent.remove(surfaceHorizonRing);
        surfaceHorizonRing.geometry.dispose();
        surfaceHorizonRing.material.dispose();
        surfaceHorizonRing = null;
      }
      const ringPts = [];
      const ringRadius = Math.sqrt(2 * VISUAL_R * EYE_HEIGHT);
      for (let i = 0; i <= 64; i++) {
        const a = (i / 64) * Math.PI * 2;
        const pt = surfLocal.clone()
          .addScaledVector(normal, EYE_HEIGHT)
          .addScaledVector(east, ringRadius * Math.cos(a))
          .addScaledVector(north, ringRadius * Math.sin(a));
        ringPts.push(pt);
      }
      const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPts);
      const ringMat = new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.25, depthWrite: false, depthTest: true });
      surfaceHorizonRing = new THREE.Line(ringGeo, ringMat);
      surfaceHorizonRing.frustumCulled = false;
      visualMesh.add(surfaceHorizonRing);

      // Clean up old compass labels
      for (const s of surfaceCompassLabels) {
        if (s.parent) s.parent.remove(s);
        if (s.material.map) s.material.map.dispose();
        s.material.dispose();
      }
      surfaceCompassLabels = [];
      for (const line of surfaceTickLines) {
        if (line.parent) line.parent.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      }
      surfaceTickLines = [];
      surfaceTickData = [];

      // Create compass labels at horizon
      const labelData = [
        { text: '北', color: '#ff4444', dir: north },
        { text: '南', color: '#cccccc', dir: north.clone().negate() },
        { text: '东', color: '#ffaa44', dir: east },
        { text: '西', color: '#ffaa44', dir: east.clone().negate() },
      ];
      const labelR = ringRadius * 2.2;
      for (const { text, color, dir } of labelData) {
        const s = createTextSprite(text, color, 48);
        const pos = surfLocal.clone()
          .addScaledVector(normal, EYE_HEIGHT)
          .addScaledVector(dir, labelR);
        s.position.copy(pos);
        visualMesh.add(s);
        surfaceCompassLabels.push(s);
      }

      // Azimuth tick lines and numbers on the 3D compass ring
      const tickR = ringRadius * 1.2;
      const numR = ringRadius * 1.85;
      const tickMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35, depthTest: false });
      const tickPosArr = new Float32Array(360 * 2 * 3);
      const tickGeo = new THREE.BufferGeometry();
      tickGeo.setAttribute('position', new THREE.BufferAttribute(tickPosArr, 3));
      tickGeo.setDrawRange(0, 0);
      const tickSegments = new THREE.LineSegments(tickGeo, tickMat);
      visualMesh.add(tickSegments);
      surfaceTickLines = [tickSegments];
      surfaceTickData = [];
      for (let deg = 0; deg < 360; deg += 10) {
        const rad = deg * Math.PI / 180;
        const dir = north.clone().multiplyScalar(Math.cos(rad))
          .add(east.clone().multiplyScalar(Math.sin(rad))).normalize();
        const mid = surfLocal.clone()
          .addScaledVector(normal, EYE_HEIGHT)
          .addScaledVector(dir, tickR);
        surfaceTickData.push({ mid: mid.clone(), normal: normal.clone() });
        // Number label (skip cardinal points already covered by N/S/E/W labels)
        if (deg % 10 === 0 && deg % 90 !== 0) {
          const sn = createTextSprite(String(deg), 'rgba(255,255,255,0.5)', 24);
          const pn = surfLocal.clone()
            .addScaledVector(normal, EYE_HEIGHT)
            .addScaledVector(dir, numR);
          sn.position.copy(pn);
          visualMesh.add(sn);
          surfaceCompassLabels.push(sn);
        }
      }

      // Create Sun sprite for surface mode (both Earth and Moon)
      if (surfaceSunSprite) {
        if (surfaceSunSprite.parent) surfaceSunSprite.parent.remove(surfaceSunSprite);
        if (surfaceSunSprite.material.map) surfaceSunSprite.material.map.dispose();
        surfaceSunSprite.material.dispose();
        surfaceSunSprite = null;
      }
      {
        const sc = document.createElement('canvas');
        sc.width = 128; sc.height = 128;
        const sctx = sc.getContext('2d');
        const sg = sctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        sg.addColorStop(0, 'rgba(255,245,200,1)');
        sg.addColorStop(0.15, 'rgba(255,220,80,0.9)');
        sg.addColorStop(0.4, 'rgba(255,130,30,0.4)');
        sg.addColorStop(0.7, 'rgba(255,70,10,0.1)');
        sg.addColorStop(1, 'rgba(255,70,10,0)');
        sctx.fillStyle = sg;
        sctx.fillRect(0, 0, 128, 128);
        const sMat = new THREE.SpriteMaterial({
          map: new THREE.CanvasTexture(sc),
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: false,
          transparent: true,
        });
        surfaceSunSprite = new THREE.Sprite(sMat);
        // Scale for 0.53° angular size at REAL_SUN_DIST distance
        const spriteScale = 2 * REAL_SUN_DIST * Math.tan(REAL_SUN_ANGULAR / 2);
        surfaceSunSprite.scale.set(spriteScale, spriteScale, 1);
        surfaceSunSprite.frustumCulled = false;
        surfaceSunSprite.renderOrder = 1;
        scene.add(surfaceSunSprite);
      }

      // Create atmospheric glow ring at horizon (mask sky-earth transition)
      if (surfaceAtmoGlow) {
        if (surfaceAtmoGlow.parent) surfaceAtmoGlow.parent.remove(surfaceAtmoGlow);
        surfaceAtmoGlow.geometry.dispose();
        surfaceAtmoGlow.material.dispose();
        surfaceAtmoGlow = null;
      }
      const glowGeo = new THREE.RingGeometry(ringRadius * 0.95, ringRadius * 1.15, 256);
      const glowCanvas = document.createElement('canvas');
      glowCanvas.width = 256; glowCanvas.height = 1;
      const gctx = glowCanvas.getContext('2d');
      const gGrad = gctx.createLinearGradient(0, 0, 256, 0);
      gGrad.addColorStop(0, 'rgba(74,90,106,0.35)');
      gGrad.addColorStop(0.3, 'rgba(74,90,106,0.15)');
      gGrad.addColorStop(0.5, 'rgba(74,90,106,0.0)');
      gGrad.addColorStop(0.7, 'rgba(74,90,106,0.15)');
      gGrad.addColorStop(1, 'rgba(74,90,106,0.35)');
      gctx.fillStyle = gGrad;
      gctx.fillRect(0, 0, 256, 1);
      const glowMat = new THREE.MeshBasicMaterial({
        map: new THREE.CanvasTexture(glowCanvas),
        transparent: true,
        opacity: 0.5,
        side: THREE.DoubleSide,
        depthWrite: false,
        depthTest: false,
      });
      surfaceAtmoGlow = new THREE.Mesh(glowGeo, glowMat);
      surfaceAtmoGlow.position.copy(
        surfLocal.clone().addScaledVector(normal, EYE_HEIGHT * 2)
      );
      surfaceAtmoGlow.lookAt(surfLocal);
      surfaceAtmoGlow.rotateX(Math.PI / 2);
      visualMesh.add(surfaceAtmoGlow);

      // Sky dome for Earth surface mode (covers starfield during daytime)
      if (surfaceSkyDome) {
        if (surfaceSkyDome.parent) surfaceSkyDome.parent.remove(surfaceSkyDome);
        surfaceSkyDome.geometry.dispose();
        surfaceSkyDome.material.dispose();
        surfaceSkyDome = null;
      }
      if (isEarth) {
        const domeGeo = new THREE.SphereGeometry(100, 32, 32);
        const domeMat = new THREE.MeshBasicMaterial({
          color: 0x87CEEB,
          transparent: true,
          opacity: 0.25,
          side: THREE.BackSide,
          depthWrite: false,
        });
        surfaceSkyDome = new THREE.Mesh(domeGeo, domeMat);
        surfaceSkyDome.frustumCulled = false;
        scene.add(surfaceSkyDome);
      }

      updateSurfaceCameraLocal();
    });

    // ============================================================
    // Surface mode — real‑scale camera
    // ============================================================
    function updateSurfaceCameraLocal() {
      const isEarth = surfaceBody === 'earth';
      const targetMesh = isEarth ? earthMesh : moonMesh;
      const visualMesh = isEarth ? surfaceEarthMesh : surfaceMoonRealMesh;
      const VISUAL_R = isEarth ? REAL_EARTH_R : REAL_MOON_R;

      // Sync visual mesh each frame
      visualMesh.position.copy(targetMesh.position);
      visualMesh.quaternion.copy(targetMesh.quaternion);
      visualMesh.updateMatrixWorld(true);

      const cLat = Math.cos(surfaceLat);
      const surfLocal = new THREE.Vector3(
        VISUAL_R * Math.cos(surfaceLon) * cLat,
        VISUAL_R * Math.sin(surfaceLat),
        -VISUAL_R * Math.sin(surfaceLon) * cLat
      );
      const normal = surfLocal.clone().normalize();
      const up = normal.clone();

      const locNorth = new THREE.Vector3(0, 1, 0);
      const east = new THREE.Vector3().crossVectors(locNorth, up).normalize();
      if (east.lengthSq() < 0.001) east.set(0, 0, 1).cross(up).normalize();
      const north = new THREE.Vector3().crossVectors(up, east).normalize();

      // Observer position and world normal (needed before auto-track)
      const EYE_HEIGHT = Math.max(VISUAL_R * 1.57e-5, camera.near * 1.5);
      const camWorld = visualMesh.localToWorld(surfLocal.clone().add(normal.clone().multiplyScalar(EYE_HEIGHT)));
      const observerPos = camWorld;
      const worldNormal = normal.clone().applyQuaternion(visualMesh.quaternion).normalize();

      // Sun and target body directions (needed before auto-track)
      const sunDir = new THREE.Vector3().subVectors(sunMesh.position, observerPos).normalize();
      const sunAlt = Math.asin(Math.max(-1, Math.min(1, sunDir.dot(worldNormal))));
      const targetBodyMesh = isEarth ? surfaceMoonRealMesh : surfaceEarthMesh;
      const targetBodyDir = new THREE.Vector3().subVectors(targetBodyMesh.position, observerPos).normalize();
      const targetBodyAlt = Math.asin(Math.max(-1, Math.min(1, targetBodyDir.dot(worldNormal))));

      // Auto-track — runs BEFORE camera setup so current-frame yaw/pitch take effect immediately
      if (surfaceAutoTrack !== 'off') {
        const trackDir = surfaceAutoTrack === 'sun' ? sunDir : targetBodyDir;
        const trackAlt = surfaceAutoTrack === 'sun' ? sunAlt : targetBodyAlt;
        surfacePitch = Math.max(0.0, Math.min(Math.PI / 2 - 0.01, trackAlt));
        const trackHoriz = trackDir.clone().sub(worldNormal.clone().multiplyScalar(trackDir.dot(worldNormal))).normalize();
        if (trackHoriz.lengthSq() > 0.001) {
          const worldNorth = north.clone().applyQuaternion(visualMesh.quaternion).normalize();
          const northHoriz = worldNorth.clone().sub(worldNormal.clone().multiplyScalar(worldNorth.dot(worldNormal))).normalize();
          const rightHoriz = new THREE.Vector3().crossVectors(northHoriz, worldNormal).normalize();
          const yawToTarget = Math.atan2(trackHoriz.dot(rightHoriz), trackHoriz.dot(northHoriz));
          surfaceYaw = -yawToTarget;
        }
      }

      // Camera look direction using current frame's yaw/pitch
      let lookDir = north.clone();
      lookDir.applyAxisAngle(up, surfaceYaw);
      const right = new THREE.Vector3().crossVectors(lookDir, up).normalize();
      lookDir.applyAxisAngle(right, surfacePitch);

      const lookWorld = visualMesh.localToWorld(surfLocal.clone().add(lookDir.clone().multiplyScalar(200)));
      const forward = lookDir.clone().applyQuaternion(visualMesh.quaternion).normalize();
      const camRight = new THREE.Vector3().crossVectors(forward, worldNormal).normalize();
      if (camRight.lengthSq() < 0.001) {
        const eastWorld = new THREE.Vector3(0, 1, 0).cross(worldNormal).normalize();
        camRight.copy(eastWorld);
      }
      const camUp = new THREE.Vector3().crossVectors(camRight, forward).normalize();

      camera.position.copy(camWorld);
      camera.up.copy(camUp);
      camera.lookAt(lookWorld);
      const camDir = camera.getWorldDirection(new THREE.Vector3());
      debugCamAlt = Math.asin(Math.max(-1, Math.min(1, camDir.dot(worldNormal))));

      // Sun sprite in world space (child of scene, not visualMesh)
      const sunDirFromCamera = new THREE.Vector3().subVectors(sunMesh.position, camWorld).normalize();
      debugCamSunAlt = Math.asin(Math.max(-1, Math.min(1, sunDirFromCamera.dot(worldNormal))));
      if (surfaceSunSprite && surfaceSunSprite.parent) {
        const fwd = surfaceAutoTrack === 'sun'
          ? camera.getWorldDirection(new THREE.Vector3())
          : sunDirFromCamera.clone();
        const spriteWorld = camWorld.clone().add(fwd.multiplyScalar(REAL_SUN_DIST));
        surfaceSunSprite.position.copy(spriteWorld);
        surfaceSunSprite.visible = sunAlt > -0.05;
      }

      // Smooth day/night transition for sky dome and starfield
      const dayFactor = Math.max(0, Math.min(1, (sunAlt / 0.035 + 1) / 2));
      const fade = dayFactor * dayFactor * (3 - 2 * dayFactor);

      if (surfaceSkyDome) {
        surfaceSkyDome.position.copy(camWorld);
        const op = isEarth ? fade * 0.25 : 0;
        surfaceSkyDome.material.opacity = op;
        surfaceSkyDome.visible = op > 0;
      }

      if (isEarth) {
        starfield.material.opacity = 1 - fade;
        starfield.visible = fade < 1;
      } else {
        starfield.material.opacity = 1;
        starfield.visible = true;
      }

      // Ray-sphere intersection
      const targetCenter = targetMesh.position.clone();
      const targetR = isEarth ? REAL_EARTH_R : REAL_MOON_R;
      const rayOrigin = observerPos.clone().add(worldNormal.clone().multiplyScalar(0.001));
      const sunRay = new THREE.Ray(rayOrigin, sunDir.clone());
      const hitPt = new THREE.Vector3();
      const hitSphere = new THREE.Sphere(targetCenter, targetR);
      debugSunRayHit = sunRay.intersectSphere(hitSphere, hitPt) !== null;
      debugSunRayDist = debugSunRayHit ? rayOrigin.distanceTo(hitPt) : 0;

      // Debug values
      debugSunAlt = sunAlt;
      debugTargetAlt = targetBodyAlt;
      const centerSunDir = new THREE.Vector3().subVectors(sunMesh.position, targetMesh.position).normalize();
      debugSunAltCenter = Math.asin(Math.max(-1, Math.min(1, centerSunDir.dot(worldNormal))));
      const sunHoriz = sunDir.clone().sub(worldNormal.clone().multiplyScalar(sunDir.dot(worldNormal))).normalize();
      const targetHoriz = targetBodyDir.clone().sub(worldNormal.clone().multiplyScalar(targetBodyDir.dot(worldNormal))).normalize();
      const forwardDir = lookDir.clone().applyQuaternion(visualMesh.quaternion).normalize();
      if (forwardDir.lengthSq() > 0.001) {
        const fwdHoriz = forwardDir.clone().sub(worldNormal.clone().multiplyScalar(forwardDir.dot(worldNormal))).normalize();
        const rightHoriz = new THREE.Vector3().crossVectors(fwdHoriz, worldNormal).normalize();
        if (sunHoriz.lengthSq() > 0.001) {
          debugSunAzimuth = Math.atan2(sunHoriz.dot(rightHoriz), sunHoriz.dot(fwdHoriz));
          debugYawDiff = debugSunAzimuth;
        }
        if (targetHoriz.lengthSq() > 0.001) {
          debugTargetAz = Math.atan2(targetHoriz.dot(rightHoriz), targetHoriz.dot(fwdHoriz));
        }
      }
      debugDayFraction = Math.max(0, Math.min(1, 0.5 + debugSunAlt / Math.PI));

      // Freeze debug: log state near -76.9° sun altitude
      if (Math.abs(sunAlt + 1.342) < 0.05) {
        const miv = visualMesh && visualMesh.matrixWorldInverse;
        const mivStr = miv ? miv.elements.join(',') : '(missing)';
        console.log('[FREEZE_DEBUG]', JSON.stringify({
          sunAlt: (sunAlt * 180 / Math.PI).toFixed(2),
          surfacePitch: (surfacePitch * 180 / Math.PI).toFixed(2),
          surfaceYaw: (surfaceYaw * 180 / Math.PI).toFixed(2),
          frameCount: window._frameCount || 0,
          visualMeshType: typeof visualMesh,
          mivExists: !!miv,
          cameraMode
        }));
      }
    }

    function updateSurfaceCamera() {
      if (cameraMode !== 'earthSurface' && cameraMode !== 'moonSurface') return;
      if (!surfaceBody) return;
      if (surfaceConfirmed) {
        updateSurfaceCameraLocal();
      } else {
        // Before confirmation, just follow body orbital motion
        const targetMesh = surfaceBody === 'earth' ? earthMesh : moonMesh;
        const bodyPos = targetMesh.position.clone();
        const delta = bodyPos.clone().sub(prevTarget);
        controls.target.copy(bodyPos);
        camera.position.add(delta);
        prevTarget.copy(bodyPos);
      }
    }

    // Season buttons — jump to that day
    function getSeasonOffsets(year) {
      const s = Astronomy.Seasons(year);
      const ms = d => (d.getTime() - YEAR_START.getTime()) / DAY_MS;
      return [0, ms(s.jun_solstice.date), ms(s.sep_equinox.date), ms(s.dec_solstice.date)];
    }
    ['btnSpring', 'btnSummer', 'btnAutumn', 'btnWinter'].forEach((id, i) => {
      document.getElementById(id).addEventListener('click', () => {
        playing = false;
        playBtn.textContent = '▶';
        simDayOffset = getSeasonOffsets(currentYear)[i];
        updateBodies();
        updateUI();
      });
    });

    // ============================================================
    // Debug overlay — show numerical Sun/position info
    // ============================================================
    function updateDebugOverlay() {
      if (cameraMode !== 'earthSurface' && cameraMode !== 'moonSurface') {
        document.getElementById('debug-overlay').style.display = 'none';
        return;
      }
      document.getElementById('debug-overlay').style.display = 'block';

      const altDeg = (debugSunAlt * 180 / Math.PI).toFixed(1);
      const yawDeg = (((surfaceYaw * 180 / Math.PI) % 360) + 360) % 360;
      const camAltDeg = (debugCamAlt * 180 / Math.PI).toFixed(1);
      const currentDate = new Date(YEAR_START.getTime() + simDayOffset * DAY_MS);
      const dateStr = beijingDateTimeStr(currentDate);
      const latDeg = Math.abs(surfaceLat * 180 / Math.PI);
      const lonDeg = Math.abs(surfaceLon * 180 / Math.PI);
      const latDir = surfaceLat >= 0 ? 'N' : 'S';
      const lonDir = surfaceLon >= 0 ? 'E' : 'W';

      const isEarth = surfaceBody === 'earth';
      const targetName = isEarth ? '月亮' : '地球';
      document.getElementById('dbg-target-alt-label').textContent = targetName + '高度';
      document.getElementById('dbg-target-az-label').textContent = targetName + '方位';
      document.getElementById('track-body').textContent = targetName;

      const sunAzDeg = (debugSunAzimuth * 180 / Math.PI).toFixed(1);
      const targetAltDeg = (debugTargetAlt * 180 / Math.PI).toFixed(1);
      const targetAzDeg = (debugTargetAz * 180 / Math.PI).toFixed(1);
      const trackNames = { off: '关', sun: '日', body: targetName };

      document.getElementById('dbg-coord').textContent = `${latDir} ${latDeg.toFixed(2)}°, ${lonDir} ${lonDeg.toFixed(2)}°`;
      document.getElementById('dbg-date').textContent = dateStr;
      document.getElementById('dbg-sun-alt').textContent = `${altDeg}°`;
      document.getElementById('dbg-sun-az').textContent = `${sunAzDeg}°`;
      document.getElementById('dbg-target-alt').textContent = `${targetAltDeg}°`;
      document.getElementById('dbg-target-az').textContent = `${targetAzDeg}°`;
      document.getElementById('dbg-camalt').textContent = `${camAltDeg}°`;
      document.getElementById('dbg-yaw').textContent = `${yawDeg.toFixed(1)}°`;
      document.getElementById('dbg-track').textContent = trackNames[surfaceAutoTrack] || surfaceAutoTrack;

      // Highlight active track button
      ['track-off', 'track-sun', 'track-body'].forEach(id => {
        document.getElementById(id).classList.toggle('active', surfaceAutoTrack === ({ 'track-off': 'off', 'track-sun': 'sun', 'track-body': 'body' })[id]);
      });
    }

    // ============================================================
    // Animation loop
    // ============================================================
    // Fixed pixel size for label sprites — scale proportional to camera distance
    const _labelWP = new THREE.Vector3();
    function setLabelPx(sprite, pxHeight) {
      sprite.getWorldPosition(_labelWP);
      const dist = camera.position.distanceTo(_labelWP) || 1;
      const fovRad = camera.fov * Math.PI / 180;
      const scale = pxHeight * 2 * dist * Math.tan(fovRad / 2) / window.innerHeight;
      sprite.scale.set(scale * 2, scale, 1);  // canvas is 2:1
    }

    function animate(now) {
      requestAnimationFrame(animate);
      window._frameCount = (window._frameCount || 0) + 1;

      if (playing) {
        const dt = Math.min((now - lastFrame) / 1000, 2.0); // cap at 2s to prevent jumps
        lastFrame = now;
        simDayOffset += dt * getSpeedDaysPerSec();
        while (simDayOffset >= 365) simDayOffset -= 365;
        while (simDayOffset < 0) simDayOffset += 365;
        updateBodies();
        updateUI();
      }

      updateCameraTarget();
      if (controls.enabled) controls.update();

      // Update HTML compass rotation
      if (cameraMode === 'earthSurface' || cameraMode === 'moonSurface') {
        const compass = document.getElementById('surface-compass');
        if (compass.style.display !== 'none') {
          compass.style.transform = 'translateX(-50%) rotate(' + (surfaceYaw * 180 / Math.PI) + 'deg)';
        }
      }

      // Season markers fixed pixel size
      for (const { sprite } of seasonMarkers) {
        if (sprite.visible) setLabelPx(sprite, 24);
      }
      for (const { cone } of seasonMarkers) {
        if (cone.visible) {
          const dist = camera.position.distanceTo(cone.position) || 1;
          const fovRad = camera.fov * Math.PI / 180;
          const px = 20;
          const s = px * 4 * dist * Math.tan(fovRad / 2) / window.innerHeight;
          cone.scale.set(s, s, s);
        }
      }

      // Sprite screen-space projection
      // MUST call updateMatrixWorld before getWorldPosition/project so
      // camera position/direction set in updateSurfaceCameraLocal() take effect
      if (surfaceSunSprite && surfaceSunSprite.parent && (cameraMode === 'earthSurface' || cameraMode === 'moonSurface')) {
        const sw = new THREE.Vector3();
        surfaceSunSprite.parent.updateMatrixWorld(true);
        surfaceSunSprite.getWorldPosition(sw);
        camera.updateMatrixWorld(true);
        camera.updateProjectionMatrix();
        const swNDC = sw.clone().project(camera);
        spriteOnScreen = Math.abs(swNDC.x) <= 1.1 && Math.abs(swNDC.y) <= 1.1 && swNDC.z >= -1 && swNDC.z <= 1;
        spriteScreenX = swNDC.x;
        spriteScreenY = swNDC.y;
        spriteScreenZ = swNDC.z;
      } else {
        spriteOnScreen = false;
        spriteScreenX = spriteScreenY = spriteScreenZ = 0;
      }

      // Target body screen projection (moon on earth, earth on moon)
      if (cameraMode === 'earthSurface' || cameraMode === 'moonSurface') {
        const isEarth = surfaceBody === 'earth';
        const tbMesh = isEarth ? surfaceMoonRealMesh : surfaceEarthMesh;
        camera.updateMatrixWorld(true);
        camera.updateProjectionMatrix();
        const tbNDC = tbMesh.position.clone().project(camera);
        targetBodyOnScreen = Math.abs(tbNDC.x) <= 1.1 && Math.abs(tbNDC.y) <= 1.1 && tbNDC.z >= -1 && tbNDC.z <= 1;
        targetBodyScreenX = tbNDC.x;
        targetBodyScreenY = tbNDC.y;
      } else {
        targetBodyOnScreen = false;
        targetBodyScreenX = targetBodyScreenY = 0;
      }

      // Fixed pixel size for azimuth tick lines (computed in visualMesh local space)
      if (surfaceTickData.length && surfaceTickLines.length) {
        const parent = surfaceTickLines[0].parent;
        if (parent) {
          parent.updateMatrixWorld(true);
          const localCam = new THREE.Vector3().copy(camera.position);
          parent.worldToLocal(localCam);
          const arr = surfaceTickLines[0].geometry.attributes.position.array;
          for (let i = 0; i < surfaceTickData.length; i++) {
            const { mid, normal } = surfaceTickData[i];
            const dist = localCam.distanceTo(mid) || 1;
            const halfLen = 8 * dist * Math.tan(camera.fov * Math.PI / 180 / 2) / window.innerHeight;
            const idx = i * 6;
            arr[idx]   = mid.x + normal.x * halfLen;
            arr[idx+1] = mid.y + normal.y * halfLen;
            arr[idx+2] = mid.z + normal.z * halfLen;
            arr[idx+3] = mid.x - normal.x * halfLen;
            arr[idx+4] = mid.y - normal.y * halfLen;
            arr[idx+5] = mid.z - normal.z * halfLen;
          }
          surfaceTickLines[0].geometry.attributes.position.needsUpdate = true;
          surfaceTickLines[0].geometry.setDrawRange(0, surfaceTickData.length * 2);
        }
      }

      // Fixed pixel size for surface compass labels
      for (const lbl of surfaceCompassLabels) {
        setLabelPx(lbl, 34);
      }

      updateDebugOverlay();
      // Expose debug state for Playwright tests
      window.__dbg = { debugSunAlt, debugSunAltCenter, debugSunAzimuth, debugTargetAlt, debugTargetAz, debugDayFraction, debugCamAlt, debugCamSunAlt, simDayOffset, surfaceYaw, surfacePitch, surfaceAutoTrack, playing, spriteOnScreen, spriteScreenX, spriteScreenY, spriteScreenZ, cameraMode, sunMeshVisible: sunMesh.visible, sunSpriteVisible: surfaceSunSprite ? surfaceSunSprite.visible : null, frameCount: window._frameCount || 0, targetBodyOnScreen, targetBodyScreenX, targetBodyScreenY };
    window.__setSimDayOffset = (v) => { simDayOffset = v; updateBodies(); updateUI(); };
    window.__setAutoTrack = (v) => { surfaceAutoTrack = v; };
      composer.render();
    }

    // ============================================================
    // Camera mode tracking — move target AND camera together
    // ============================================================
    let prevTarget = new THREE.Vector3();

    function updateCameraTarget() {
      if (cameraMode === 'geocentric' || cameraMode === 'selenocentric') {
        const bodyPos = cameraMode === 'geocentric' ? earthMesh.position : moonMesh.position;
        const delta = bodyPos.clone().sub(prevTarget);
        controls.target.copy(bodyPos);
        camera.position.add(delta);
        prevTarget.copy(bodyPos);
      } else if (cameraMode === 'earthSurface' || cameraMode === 'moonSurface') {
        updateSurfaceCamera();
      }
    }

    // ============================================================
    // Start
    // ============================================================
    updateBodies();
    updateUI();
    lastFrame = performance.now();
    requestAnimationFrame(animate);

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
